# -----------------------------------------------------------------------------
# RS4IT MCP Hub + Admin Panel — Docker Compose
# -----------------------------------------------------------------------------
# Usage:
#   1. Copy .env.docker.example to .env and set SESSION_SECRET (required for admin).
#   2. docker compose up -d
#   3. Hub: http://localhost:3000/mcp   Admin: http://localhost:3001
#   4. First time: open Admin → /login → Create admin account
#
# Container and volume names are unique by default: Compose uses the project
# directory name as project name (e.g. "rs4it-mcp" → rs4it-mcp-hub-1, rs4it-mcp_config_data).
# -----------------------------------------------------------------------------

services:
  hub:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    image: rs4it-mcp-hub:latest
    restart: unless-stopped
    ports:
      - "${HUB_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      MCP_PORT: 3000
      # Force an in-container DB location (don't inherit host .env DATABASE_URL)
      DATABASE_URL: file:/app/config/rs4it.db
      MCP_WORKSPACE_ROOT: ${MCP_WORKSPACE_ROOT:-/workspace}
      BASE_URL: ${HUB_BASE_URL:-http://localhost:3000}
      # IMPORTANT:
      # - When running behind a domain, set MCP_ALLOWED_HOSTS to that domain.
      # - When running via docker-compose, internal service-to-service calls use host "hub",
      #   so "hub" must be allowed or Admin setup/login will fail with "Invalid Host: hub".
      MCP_ALLOWED_HOSTS: ${MCP_ALLOWED_HOSTS:-hub}
      MCP_ADMIN_API_SECRET: ${MCP_ADMIN_API_SECRET:-}
    volumes:
      # DB-only volume (contains rs4it.db)
      - hub_db:/app/config
      # Optional: mount workspace for file tools (create_file, read_file, run_command)
      - ${WORKSPACE_PATH:-./workspace}:/workspace
    healthcheck:
      # GET /mcp returns 400 (no session) or 405; either means server is up
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/mcp',r=>{const ok=[400,405].includes(r.statusCode); process.exit(ok?0:1)}).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - rs4it

  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
    image: rs4it-mcp-admin:latest
    restart: unless-stopped
    ports:
      - "${ADMIN_PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      HOSTNAME: "0.0.0.0"
      # Admin calls Hub to reload plugins after add/remove/disable (no Hub restart needed)
      # IMPORTANT: inside Docker, default should be the internal service URL.
      # Use ADMIN_HUB_BASE_URL to override internal calls without affecting Hub public BASE_URL.
      HUB_BASE_URL: ${ADMIN_HUB_BASE_URL:-http://hub:3000}
      # If Hub protects admin APIs with MCP_ADMIN_API_SECRET, Admin must send it.
      MCP_ADMIN_API_SECRET: ${MCP_ADMIN_API_SECRET:-}
      ADMIN_HUB_SECRET: ${ADMIN_HUB_SECRET:-}
      # Required for admin auth (min 16 chars)
      SESSION_SECRET: ${SESSION_SECRET:?Set SESSION_SECRET in .env}
    depends_on:
      hub:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3001/login"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - rs4it

volumes:
  hub_db:
    # Persists rs4it.db only

networks:
  rs4it:
    driver: bridge
